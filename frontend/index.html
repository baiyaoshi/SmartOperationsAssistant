<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Smart Operations Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header a {
            color: #91d5ff;
            font-size: 14px;
            font-weight: 400;
            text-decoration: none;
        }
        .header a:hover { text-decoration: underline; }
        .spacer { flex: 1; }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
        }
        #output {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg-row { display: flex; margin-bottom: 12px; }
        .msg-user { justify-content: flex-end; }
        .msg-assistant { justify-content: flex-start; }
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .msg-user .msg-bubble { background: #1890ff; color: white; border-bottom-right-radius: 4px; }
        .msg-assistant .msg-bubble { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
        .cursor { display: inline-block; width: 6px; height: 16px; background: #333; animation: blink 1s step-end infinite; margin-left: 2px; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        .input-area {
            display: flex;
            gap: 8px;
        }
        #input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        #input:focus { border-color: #1890ff; }
        #btn {
            padding: 10px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        #btn:hover { background: #40a9ff; }
        #btn:disabled { background: #d9d9d9; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        🔧 Smart Operations Assistant
        <span class="spacer"></span>
        <a href="javascript:void(0)" onclick="location.href='/frontend/knowledge.html?t='+Date.now()">📚 知识库</a>
        <a href="javascript:void(0)" onclick="location.href='/frontend/chat.html?t='+Date.now()">💬 RAG 聊天</a>
    </div>
    <div class="container">
        <div id="output"></div>
        <div class="input-area">
            <input id="input" type="text" placeholder="输入问题，例如：我的电脑很卡" onkeydown="if(event.key==='Enter') send()">
            <button id="btn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');

        // 优先从 URL 读 session_id，没有则从 localStorage 生成
        const urlParams = new URLSearchParams(window.location.search);
        let sessionId = urlParams.get('session_id');
        if (!sessionId) {
            sessionId = localStorage.getItem('diagnosis_session_id');
        }
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        }
        localStorage.setItem('diagnosis_session_id', sessionId);

        // 从后端 Redis 加载历史记录
        async function loadHistory() {
            try {
                const resp = await fetch('/api/v1/agent/history/' + sessionId);
                const data = await resp.json();
                console.log('[history] 返回:', data);
                if (!data.messages || data.messages.length === 0) return;
                for (const msg of data.messages) {
                    const text = (msg.content || '').trim();
                    if (!text) continue;
                    const row = document.createElement('div');
                    row.className = 'msg-row msg-' + (msg.role === 'user' ? 'user' : 'assistant');
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    bubble.textContent = text;
                    row.appendChild(bubble);
                    output.appendChild(row);
                }
                output.scrollTop = output.scrollHeight;
            } catch(e) {
                console.log('[history] 错误:', e);
            }
        }
        loadHistory();

        async function send() {
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            btn.disabled = true;

            // 用户消息气泡
            const userRow = document.createElement('div');
            userRow.className = 'msg-row msg-user';
            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble';
            userBubble.textContent = message;
            userRow.appendChild(userBubble);
            output.appendChild(userRow);
            output.scrollTop = output.scrollHeight;

            // 助手消息占位 + 光标
            const assistantRow = document.createElement('div');
            assistantRow.className = 'msg-row msg-assistant';
            const assistantBubble = document.createElement('div');
            assistantBubble.className = 'msg-bubble';
            assistantBubble.innerHTML = '<span class="cursor"></span>';
            assistantRow.appendChild(assistantBubble);
            output.appendChild(assistantRow);
            output.scrollTop = output.scrollHeight;

            let fullText = '';

            try {
                const response = await fetch('/api/v1/agent/demo/memory/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') {
                            fullText += '\n--- 诊断完成 ---';
                            assistantBubble.innerHTML = fullText.replace(/\n/g, '<br>');
                            output.scrollTop = output.scrollHeight;
                            continue;
                        }

                        const text = data.trim();
                        if (!text) continue;

                        if (fullText) fullText += '\n';
                        fullText += text;
                        assistantBubble.innerHTML = fullText.replace(/\n/g, '<br>') + '<span class="cursor"></span>';
                        output.scrollTop = output.scrollHeight;
                    }
                }
            } catch (err) {
                fullText += '\n❌ 连接失败: ' + err.message;
            } finally {
                assistantBubble.innerHTML = fullText.replace(/\n/g, '<br>');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

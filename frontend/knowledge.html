<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header a {
            color: #91d5ff;
            font-size: 14px;
            font-weight: 400;
            text-decoration: none;
        }
        .header a:hover { text-decoration: underline; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* 上传区域 */
        .upload-area {
            background: white;
            border: 2px dashed #d9d9d9;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 24px;
        }
        .upload-area:hover { border-color: #1890ff; }
        .upload-area.dragover { border-color: #1890ff; background: #e6f7ff; }
        .upload-icon { font-size: 48px; color: #999; margin-bottom: 12px; }
        .upload-text { color: #666; font-size: 14px; }
        .upload-text strong { color: #1890ff; cursor: pointer; }
        .upload-hint { color: #999; font-size: 12px; margin-top: 8px; }
        #fileInput { display: none; }

        /* 上传进度 */
        .upload-progress {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            display: none;
        }
        .upload-progress.active { display: block; }
        .progress-bar-bg {
            background: #f0f0f0;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            background: #1890ff;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .upload-status { font-size: 13px; color: #666; margin-top: 8px; }

        /* 文档列表 */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-list {
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .doc-empty {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        .doc-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .doc-item:last-child { border-bottom: none; }
        .doc-item:hover { background: #fafafa; }
        .doc-icon { font-size: 20px; margin-right: 12px; }
        .doc-info { flex: 1; }
        .doc-name { font-size: 14px; font-weight: 500; color: #333; }
        .doc-meta { font-size: 12px; color: #999; margin-top: 2px; }
        .doc-delete {
            padding: 6px 12px;
            border: 1px solid #ff4d4f;
            border-radius: 4px;
            background: white;
            color: #ff4d4f;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .doc-delete:hover { background: #ff4d4f; color: white; }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        📚 知识库管理
        <a href="/frontend">← 返回诊断页面</a>
        <a href="/frontend/chat.html">RAG 聊天 →</a>
    </div>
    <div class="container">
        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <div class="upload-text">
                拖拽文件到此处，或 <strong>点击选择文件</strong><br>
                支持 .txt / .md 格式
            </div>
            <div class="upload-hint">文件内容将自动分块并存入 Milvus 向量库</div>
        </div>
        <input type="file" id="fileInput" accept=".txt,.md">

        <!-- 上传进度 -->
        <div class="upload-progress" id="uploadProgress">
            <div style="font-size:13px; color:#333;" id="uploadFileName"></div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="upload-status" id="uploadStatus">正在上传...</div>
        </div>

        <!-- 文档列表 -->
        <div class="section-title">
            <span>已上传文档</span>
            <button onclick="refreshList()" style="padding:4px 12px;border:1px solid #d9d9d9;border-radius:4px;background:white;font-size:13px;cursor:pointer;">🔄 刷新</button>
        </div>
        <div class="doc-list" id="docList">
            <div class="doc-empty">加载中...</div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadFileName = document.getElementById('uploadFileName');
        const docList = document.getElementById('docList');

        // 拖拽上传
        uploadArea.addEventListener('dragover', e => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) uploadFile(fileInput.files[0]);
        });

        async function uploadFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['txt', 'md'].includes(ext)) {
                showToast('仅支持 .txt 和 .md 文件', 'error');
                return;
            }

            // 显示进度
            uploadProgress.classList.add('active');
            uploadFileName.textContent = '📄 ' + file.name;
            progressBar.style.width = '0%';
            uploadStatus.textContent = '正在上传...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                // 模拟进度（XHR 没有真实的上传进度回调，用 fetch + 模拟）
                progressBar.style.width = '50%';
                uploadStatus.textContent = '正在处理...';

                const resp = await fetch('/api/v1/knowledge/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || '上传失败');
                }

                const result = await resp.json();
                progressBar.style.width = '100%';
                uploadStatus.textContent = `✅ 上传成功！分 ${result.chunks} 块`;
                showToast(`"${file.name}" 上传成功，共 ${result.chunks} 块`, 'success');
                refreshList();

                setTimeout(() => {
                    uploadProgress.classList.remove('active');
                }, 2000);
            } catch (err) {
                progressBar.style.width = '100%';
                progressBar.style.background = '#ff4d4f';
                uploadStatus.textContent = '❌ ' + err.message;
                showToast(err.message, 'error');
            }
        }

        // 获取文档列表
        async function refreshList() {
            docList.innerHTML = '<div class="doc-empty">加载中...</div>';
            try {
                const resp = await fetch('/api/v1/knowledge/documents');
                if (!resp.ok) throw new Error('获取失败');
                const data = await resp.json();

                if (data.documents.length === 0) {
                    docList.innerHTML = '<div class="doc-empty">📭 暂无上传的文档</div>';
                    return;
                }

                docList.innerHTML = '';
                data.documents.forEach(doc => {
                    const item = document.createElement('div');
                    item.className = 'doc-item';
                    item.innerHTML = `
                        <div class="doc-icon">📄</div>
                        <div class="doc-info">
                            <div class="doc-name">${doc.filename}</div>
                            <div class="doc-meta">${doc.chunks} 个分块 · ${doc.upload_time}</div>
                        </div>
                        <button class="doc-delete" onclick="deleteDoc('${doc.filename}')">删除</button>
                    `;
                    docList.appendChild(item);
                });
            } catch (err) {
                docList.innerHTML = '<div class="doc-empty">❌ 加载失败: ' + err.message + '</div>';
            }
        }

        // 删除文档
        async function deleteDoc(filename) {
            if (!confirm(`确定删除 "${filename}" 吗？`)) return;

            try {
                const resp = await fetch('/api/v1/knowledge/documents/' + encodeURIComponent(filename), {
                    method: 'DELETE',
                });
                if (!resp.ok) throw new Error('删除失败');
                showToast(`"${filename}" 已删除`, 'success');
                refreshList();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Toast
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始加载
        refreshList();
    </script>
</body>
</html>

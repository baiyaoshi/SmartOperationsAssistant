<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库问答</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header a {
            color: #91d5ff;
            font-size: 14px;
            font-weight: 400;
            text-decoration: none;
        }
        .header a:hover { text-decoration: underline; }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
        }
        #output {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg-row {
            display: flex;
            margin-bottom: 12px;
        }
        .msg-user {
            justify-content: flex-end;
        }
        .msg-assistant {
            justify-content: flex-start;
        }
        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .msg-user .msg-bubble {
            background: #1890ff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-assistant .msg-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .progress-line {
            padding: 4px 0;
            color: #888;
            font-size: 13px;
            font-style: italic;
        }
        .stats-line {
            padding: 4px 0;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            margin-top: 4px;
            padding-top: 8px;
        }
        .cursor {
            display: inline-block;
            width: 6px;
            height: 16px;
            background: #333;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            vertical-align: middle;
        }
        .msg-assistant .cursor { background: #333; }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        #input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        #input:focus { border-color: #1890ff; }
        #btn {
            padding: 10px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        #btn:hover { background: #40a9ff; }
        #btn:disabled { background: #d9d9d9; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        📚 RAG 知识库问答
        <a href="/frontend">← 返回诊断页面</a>
    </div>
    <div class="container">
        <div id="output"></div>
        <div class="input-area">
            <input id="input" type="text" placeholder="输入问题，例如：什么是 CPU 使用率？" onkeydown="if(event.key==='Enter') send()">
            <button id="btn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');

        const urlParams = new URLSearchParams(window.location.search);
        let sessionId = urlParams.get('session_id');
        if (!sessionId) {
            sessionId = 'rag_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            const newUrl = window.location.pathname + '?session_id=' + sessionId;
            window.history.replaceState({}, '', newUrl);
        }

        function addMessage(role, text) {
            const row = document.createElement('div');
            row.className = 'msg-row msg-' + role;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = text;
            row.appendChild(bubble);

            output.appendChild(row);
            output.scrollTop = output.scrollHeight;
            return bubble;
        }

        function addProgress(text) {
            const div = document.createElement('div');
            div.className = 'progress-line';
            div.textContent = '⏳ ' + text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
            return div;
        }

        function addStats(text) {
            const div = document.createElement('div');
            div.className = 'stats-line';
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        async function send() {
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            btn.disabled = true;

            addMessage('user', message);

            // 助手消息占位 + 光标
            const row = document.createElement('div');
            row.className = 'msg-row msg-assistant';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = '<span class="cursor"></span>';
            row.appendChild(bubble);
            output.appendChild(row);
            output.scrollTop = output.scrollHeight;

            let fullAnswer = '';
            let progressDiv = null;

            try {
                const response = await fetch('/api/v1/rag/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') continue;

                        try {
                            const event = JSON.parse(data);
                            if (event.type === 'progress') {
                                if (progressDiv) progressDiv.remove();
                                progressDiv = addProgress(event.label + (event.detail ? ': ' + event.detail : ''));
                            } else if (event.type === 'token') {
                                fullAnswer += event.content;
                                bubble.innerHTML = fullAnswer.replace(/\n/g, '<br>') + '<span class="cursor"></span>';
                                output.scrollTop = output.scrollHeight;
                            } else if (event.type === 'stats') {
                                const s = event.data;
                                addStats(`⚡ token: ${s.total_tokens} (输入 ${s.input_tokens} / 输出 ${s.output_tokens}) · 耗时 ${s.total_ms}ms`);
                            } else if (event.type === 'error') {
                                bubble.innerHTML = '❌ ' + event.message;
                            }
                        } catch (e) {
                            // 非 JSON 直接显示
                        }
                    }
                }
            } catch (err) {
                bubble.innerHTML = '❌ 连接失败: ' + err.message;
            } finally {
                // 去掉光标
                bubble.innerHTML = fullAnswer.replace(/\n/g, '<br>');
                btn.disabled = false;
                if (progressDiv) progressDiv.remove();
            }
        }
    </script>
</body>
</html>
